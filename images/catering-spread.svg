  <rect x="300" y="150" width="150" height="10" fill="#c4956a"/>
  <rect x="500" y="135" width="150" height="100" fill="#d4a574" rx="3"/>
  <rect x="500" y="135" width="150" height="10" fill="#c4956a"/>
