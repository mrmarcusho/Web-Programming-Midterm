  <rect x="50" y="180" width="700" height="8" fill="#78350f"/>
  <!-- Tablecloth pattern -->
  <rect x="60" y="188" width="680" height="165" fill="#7c2d12" opacity="0.3"/>
  <!-- Pizza boxes -->
  <rect x="100" y="140" width="150" height="100" fill="#d4a574" rx="3"/>
  <rect x="100" y="140" width="150" height="10" fill="#c4956a"/>
